<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket.IO Realtime Chat</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS (optional, for specific overrides) -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <div class="container mt-4">
      <h1 class="text-center text-primary mb-4">Realtime Chat</h1>
      <div
        id="messages"
        class="list-group mb-3 p-3 border rounded"
        style="height: 300px; overflow-y: auto"
      >
        <!-- Messages will be appended here -->
      </div>
      <form id="form" class="d-flex" action="">
        <input
          id="input"
          class="form-control me-2"
          placeholder="Ketik pesan..."
          autocomplete="off"
        />
        <button type="submit" class="btn btn-primary">Kirim</button>
      </form>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
